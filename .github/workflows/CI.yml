on:
  pull_request:
    branches: [main]
    paths:
      - frontend/**
      - backend/**
  push:
    branches: [main]

jobs:
  front-end:
    name: Next.js front-end
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  back-end:
    name: Spring Boot back-end
    runs-on: ubuntu-latest

    services:
      database:
        image: postgres
        env:
          POSTGRES_DB: pharmacy
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
        ports:
          - 50201:5432

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Wait for DB
        run: sleep 20

      - name: Build & test
        run: ./gradlew clean build
