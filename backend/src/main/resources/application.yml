spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:50201/pharmacy
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    validate-on-migrate: true
    locations: classpath:db/migration